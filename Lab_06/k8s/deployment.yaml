# Deployment for the Sentiment Analysis API
# Deploys a DistilBERT-based sentiment classifier, trained on IMDb reviews

apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: sentiment-serving
  name: sentiment-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sentiment-api
  template:
    metadata:
      labels:
        app: sentiment-api
        model: distilbert
        dataset: imdb
    spec:
      containers:
        - name: sentiment-container
          image: gcr.io/kubernetes-labs-mlops-jcm/sentiment-api:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
